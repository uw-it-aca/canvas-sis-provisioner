services:
  app:
    build:
      context: .
      target: app-container
    restart: always
    container_name: sis_provisioner_app
    environment:
      ENV: localdev
      AUTH: SAML_MOCK BLTI_DEV
    volumes:
      - ./sis_provisioner:/app/sis_provisioner
      - statics-volume:/static
    ports:
      - "${RUNSERVER_PORT:-8000}:8000"
    stdin_open: true
    tty: true
volumes:
  statics-volume:
